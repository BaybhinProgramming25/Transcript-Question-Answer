services:
  tqa-mysql:
    image: mysql
    command: --innodb-buffer-pool-size=128M
    mem_limit: 256m
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5 
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - tqa 

  backend:
    image: tqa-backend 
    build: 
      context: ./backend 
      dockerfile: Dockerfile 
    env_file:
      - ./backend/.env
    depends_on:
      tqa-mysql:
        condition: service_healthy
    volumes:
      - uploads-data:/uploads
      - faiss-data:/app/data
    ports: 
      - "127.0.0.1:3000:3000"
    networks:
      - tqa

  frontend:
    image: tqa-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - tqa  

volumes:
  mysql-data:
  uploads-data:
  faiss-data:
networks:
  tqa: 